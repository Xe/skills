<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:20px;background:var(--bg-hard)}.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.box{display:flex;flex-direction:column;align-items:center;gap:4px;font-family:var(--font-mono);font-size:10px;color:var(--fg-2)}.r{background:var(--bg-2);border:1px solid var(--bg-4)}.xs{width:44px;height:44px;border-radius:2px}.sm{width:44px;height:44px;border-radius:4px}.md{width:44px;height:44px;border-radius:6px}.lg{width:44px;height:44px;border-radius:8px}.xl{width:44px;height:44px;border-radius:12px}</style></head><body>
<div class="grid">
<div class="box"><div class="r xs"></div>xs 2px · avatars</div>
<div class="box"><div class="r sm"></div>sm 4px · tokens</div>
<div class="box"><div class="r md"></div>md 6px · cards</div>
<div class="box"><div class="r lg"></div>lg 8px · details</div>
<div class="box"><div class="r xl"></div>xl 12px · buttons</div>
</div>
<div style="height:18px"></div>
<div style="display:flex;gap:14px;align-items:flex-end">
<div style="background:var(--bg-0);width:120px;height:60px;border-radius:6px;box-shadow:var(--shadow-sm);font-family:var(--font-mono);font-size:10px;padding:6px;color:var(--fg-3)">shadow-sm</div>
<div style="background:var(--bg-0);width:120px;height:60px;border-radius:6px;box-shadow:var(--shadow-md);font-family:var(--font-mono);font-size:10px;padding:6px;color:var(--fg-3)">shadow-md (hover)</div>
</div>
</body></html>
