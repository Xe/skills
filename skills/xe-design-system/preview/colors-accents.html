<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:20px;background:var(--bg-hard);font-family:var(--font-sans)}h4{font-family:var(--font-mono);font-size:11px;margin:0 0 8px;color:var(--fg-2);font-weight:600;text-transform:uppercase;letter-spacing:.06em}.pair{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:10px}.sw{aspect-ratio:2/1;border-radius:4px;display:flex;align-items:flex-end;padding:5px;font-family:var(--font-mono);font-size:9px;font-weight:600;color:#fff}.sw.m{color:#282828}</style></head><body>
<h4>Accent — muted (light mode primary)</h4>
<div class="pair">
<div class="sw" style="background:#cc241d">red</div>
<div class="sw" style="background:#d65d0e">orange</div>
<div class="sw m" style="background:#d79921">yellow</div>
<div class="sw m" style="background:#98971a">green</div>
<div class="sw m" style="background:#689d6a">aqua</div>
<div class="sw" style="background:#458588">blue</div>
<div class="sw" style="background:#b16286">purple</div>
</div>
<h4>Accent — bright (dark mode primary)</h4>
<div class="pair">
<div class="sw" style="background:#fb4934">red</div>
<div class="sw" style="background:#fe8019">orange</div>
<div class="sw m" style="background:#fabd2f">yellow</div>
<div class="sw m" style="background:#b8bb26">green</div>
<div class="sw m" style="background:#8ec07c">aqua</div>
<div class="sw m" style="background:#83a598">blue</div>
<div class="sw m" style="background:#d3869b">purple</div>
</div>
<h4>Foreground</h4>
<div class="pair">
<div class="sw" style="background:#282828">fg0</div>
<div class="sw" style="background:#3c3836">fg1</div>
<div class="sw" style="background:#504945">fg2</div>
<div class="sw" style="background:#665c54">fg3</div>
<div class="sw" style="background:#7c6f64">fg4</div>
<div class="sw m" style="background:#928374">gray L</div>
<div class="sw m" style="background:#a89984">gray D</div>
</div>
</body></html>
