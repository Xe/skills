<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:20px;background:var(--bg-hard);font-family:var(--font-sans)}.ln{display:flex;align-items:center;gap:12px;margin-bottom:10px}.sw{width:28px;height:28px;border-radius:4px;border:1px solid rgba(0,0,0,.06)}a{font-size:16px}.lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);width:130px}.chip{background:#b80050;color:#fdf4c1;padding:2px 6px;border-radius:3px;text-decoration:underline}</style></head><body>
<div class="ln"><div class="sw" style="background:#b80050"></div><div class="lbl">link normal</div><a href="#">A link to a blog post</a></div>
<div class="ln"><div class="sw" style="background:#9e0045"></div><div class="lbl">link hover</div><span class="chip">A link to a blog post</span></div>
<div class="ln"><div class="sw" style="background:#53493c"></div><div class="lbl">visited</div><a href="#" style="color:#53493c">A link to a blog post</a></div>
<div class="ln"><div class="sw" style="background:#282828"></div><div class="lbl">visited hover</div><span style="background:#282828;color:#fff;padding:2px 6px;border-radius:3px;text-decoration:underline">A link to a blog post</span></div>
</body></html>
