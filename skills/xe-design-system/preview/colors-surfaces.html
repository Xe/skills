<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:20px;background:#e8e0c0;font-family:var(--font-sans)}h4{font-family:var(--font-mono);font-size:11px;margin:0 0 8px;color:#3c3836;font-weight:600;text-transform:uppercase;letter-spacing:.06em}.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}.sw{aspect-ratio:1/1;border-radius:4px;border:1px solid rgba(0,0,0,.08);display:flex;flex-direction:column;justify-content:flex-end;padding:6px;font-family:var(--font-mono);font-size:9px;color:#282828}.sw.d{color:#ebdbb2}.nm{font-weight:600}</style></head><body>
<h4>Light surfaces</h4>
<div class="grid">
<div class="sw" style="background:#f9f5d7"><div class="nm">hard</div><div>f9f5d7</div></div>
<div class="sw" style="background:#f2e5bc"><div class="nm">soft</div><div>f2e5bc</div></div>
<div class="sw" style="background:#fbf1c7"><div class="nm">bg0</div><div>fbf1c7</div></div>
<div class="sw" style="background:#ebdbb2"><div class="nm">bg1</div><div>ebdbb2</div></div>
<div class="sw" style="background:#d5c4a1"><div class="nm">bg2</div><div>d5c4a1</div></div>
<div class="sw" style="background:#bdae93"><div class="nm">bg3</div><div>bdae93</div></div>
<div class="sw" style="background:#a89984"><div class="nm">bg4</div><div>a89984</div></div>
</div>
<div style="height:14px"></div>
<h4>Dark surfaces</h4>
<div class="grid">
<div class="sw d" style="background:#1d2021"><div class="nm">hard</div><div>1d2021</div></div>
<div class="sw d" style="background:#32302f"><div class="nm">soft</div><div>32302f</div></div>
<div class="sw d" style="background:#282828"><div class="nm">bg0</div><div>282828</div></div>
<div class="sw d" style="background:#3c3836"><div class="nm">bg1</div><div>3c3836</div></div>
<div class="sw d" style="background:#504945"><div class="nm">bg2</div><div>504945</div></div>
<div class="sw d" style="background:#665c54"><div class="nm">bg3</div><div>665c54</div></div>
<div class="sw d" style="background:#7c6f64"><div class="nm">bg4</div><div>7c6f64</div></div>
</div>
</body></html>
