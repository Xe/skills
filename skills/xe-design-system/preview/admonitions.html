<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg-hard); font-family: var(--font-sans); color: var(--fg-0); }
  .adm {
    display: flex; gap: 0;
    max-width: 560px; margin: 0 auto 12px;
    background: var(--bg-0);
    border: 1px solid var(--bg-3);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }
  .adm .bar {
    flex: 0 0 44px;
    display: flex; align-items: flex-start; justify-content: center;
    padding-top: 14px;
    color: #fff;
  }
  .adm .body { padding: 12px 14px; }
  .adm h4 {
    font-family: var(--font-sans);
    font-size: 15px; font-weight: 700;
    margin: 0 0 4px;
    color: var(--fg-0);
  }
  .adm p {
    margin: 0; font-size: 14px; line-height: 1.5;
    color: var(--fg-1);
  }
  .adm p code {
    background: var(--bg-1); color: var(--fg-0);
    padding: 1px 5px; border-radius: 3px;
    font-size: 0.92em;
  }
  .adm--note .bar { background: var(--blue-bright); }
  .adm--tip  .bar { background: var(--green-bright); }
  .adm--warn .bar { background: var(--red-bright); }
  .adm--info .bar { background: var(--yellow-bright); color: #282828; }
</style></head>
<body>

  <div class="adm adm--note">
    <div class="bar">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
    </div>
    <div class="body"><h4>Note</h4><p>Iosevka Curly Iaso is a custom mono face served from <code>files.xeiaso.net</code>.</p></div>
  </div>

  <div class="adm adm--tip">
    <div class="bar">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
    </div>
    <div class="body"><h4>Tip</h4><p>Use <code>text-wrap: pretty</code> on headings; Podkova hates widows.</p></div>
  </div>

  <div class="adm adm--warn">
    <div class="bar">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.46 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    </div>
    <div class="body"><h4>Warning</h4><p>No blue-purple gradients. That's not the vibe.</p></div>
  </div>

  <div class="adm adm--info">
    <div class="bar">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12.01" y2="8"/><polyline points="11 12 12 12 12 16 13 16"/></svg>
    </div>
    <div class="body"><h4>Info</h4><p>Stickers are fetched live from <code>stickers.xeiaso.net/sticker/{char}/{mood}</code>.</p></div>
  </div>

</body></html>
